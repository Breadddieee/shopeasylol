<!-- shopping.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase</title>
<style>
    body { margin:0; font-family: Arial; background:#f1f3f6; }

    header {
        background:#2874f0;
        color:white;
        padding:10px 20px;
        display:flex;
        align-items:center;
        justify-content:space-between;
    }

    .logo { font-size:1.5em; font-weight:bold; }

    .search {
        width:40%;
        padding:8px;
        border:none;
        border-radius:5px;
    }

    .cart { font-size:1.2em; cursor:pointer; }

    .grid {
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
        gap:15px;
        padding:20px;
    }

    .item {
        background:white;
        border-radius:10px;
        padding:10px;
        text-align:center;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
        transition:0.3s;
    }

    .item:hover { transform:scale(1.05); }

    .item img {
        width:100%;
        height:140px;
        object-fit:cover;
        border-radius:8px;
    }

    .price { color:green; font-weight:bold; }

    .btn {
        margin-top:8px;
        padding:8px;
        border:none;
        border-radius:5px;
        background:#ff9f00;
        cursor:pointer;
        width:100%;
    }

    .btn:hover { background:#fb8c00; }

    .popup {
        position:fixed;
        bottom:20px;
        right:20px;
        background:#323232;
        color:white;
        padding:15px;
        border-radius:8px;
        display:none;
    }

    .checkout {
        position:fixed;
        bottom:0;
        width:100%;
        background:white;
        padding:10px;
        display:none;
        box-shadow:0 -2px 5px rgba(0,0,0,0.2);
        text-align:center;
    }

    .checkout button {
        padding:10px 20px;
        background:#28a745;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }
</style>
</head>
<body>

<header>
    <div class="logo">ShopEase</div>
    <input type="text" class="search" placeholder="Search for products...">
    <div class="cart">🛒 Cart</div>
</header>

<div class="grid" id="shop"></div>

<div class="popup" id="popup">Item added to cart 🛒</div>

<div class="checkout" id="checkoutBar">
    <button onclick="goToCheckout()">Proceed to Checkout</button>
</div>

<script>
const items = [
"Wireless Earbuds","Running Shoes","Smart Watch","Backpack","T-shirt",
"Sunglasses","Laptop","Smartphone","Camera","Water Bottle",
"Keyboard","Mouse","Bluetooth Speaker","Jacket","Perfume",
"Cap","Wallet","Tablet","Gaming Controller","LED Lights"
];

const shop = document.getElementById('shop');

items.forEach((name,i)=>{
    const div = document.createElement('div');
    div.className='item';
    div.innerHTML = `
        <img src="https://picsum.photos/200?random=${i}">
        <h3>${name}</h3>
        <p class="price">₹${(Math.random()*3000+500).toFixed(0)}</p>
        <button class="btn" onclick="addToCart(event)">Add to Cart</button>
    `;
    shop.appendChild(div);
});

function addToCart(e){
    e.stopPropagation();
    document.getElementById('popup').style.display='block';
    document.getElementById('checkoutBar').style.display='block';
    setTimeout(()=>{
        document.getElementById('popup').style.display='none';
    },1500);
}

function goToCheckout(){
    window.location.href = "hapybirthday.html";
}
</script>

</body>
</html>
